name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v

      - name: CLI smoke test
        run: |
          python - <<'PY'
          import json
          import pathlib
          import subprocess
          import sys
          import tempfile

          with tempfile.TemporaryDirectory() as tmp:
              path = pathlib.Path(tmp)
              tasks = path / "tasks.json"
              deps = path / "deps.json"
              out = path / "report.json"
              tasks.write_text(json.dumps([{
                  "id": "A",
                  "duration": 2.0,
                  "optimistic_duration": 1.0,
                  "pessimistic_duration": 3.0,
              }]), encoding="utf-8")
              deps.write_text("[]", encoding="utf-8")

              cmd = [
                  sys.executable,
                  "-m",
                  "sentinel_path",
                  "--tasks",
                  str(tasks),
                  "--dependencies",
                  str(deps),
                  "--output",
                  str(out),
              ]
              subprocess.run(cmd, check=True)
              payload = json.loads(out.read_text(encoding="utf-8"))
              assert "project_duration_base" in payload
          PY
